<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Autofine Studio Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Source Sans Pro',sans-serif;background:#0a0a0a;color:#e5e7eb}h1,h2{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#111}.lb{background:#222;padding:48px;border-radius:4px;max-width:400px;width:100%;text-align:center;border:1px solid rgba(255,255,255,0.05)}.lb h2{color:#fff;margin-bottom:24px}.lb input{width:100%;padding:14px;border:1px solid rgba(255,255,255,0.1);border-radius:4px;margin-bottom:12px;font-size:1rem;background:#111;color:#fff;font-family:'Source Sans Pro',sans-serif}.lb button{width:100%;padding:14px;background:#DC2626;color:white;border:none;border-radius:4px;font-weight:700;cursor:pointer;font-size:1.1rem;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px}
.dash{display:none}.dh{background:#111;color:white;padding:20px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;border-bottom:1px solid rgba(255,255,255,0.05)}.dh h1{font-size:1.5rem;color:#D1D5DB}.dh button,.dh a{padding:8px 20px;border-radius:4px;border:none;cursor:pointer;font-weight:600;font-size:0.9rem;color:white;background:rgba(255,255,255,0.1);text-decoration:none;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px}.be{background:#DC2626!important}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:32px}.sc{background:#111;padding:24px;border-radius:4px;border:1px solid rgba(255,255,255,0.05)}.sl{font-size:0.9rem;color:#9ca3af;text-transform:uppercase;font-family:'Oswald',sans-serif;letter-spacing:1px}.sv{font-size:2.5rem;font-weight:700;margin-top:4px;font-family:'Oswald',sans-serif}
.tw{padding:0 32px 32px;overflow-x:auto}table{width:100%;border-collapse:collapse;background:#111;border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,0.05)}th{background:#000;color:#D1D5DB;padding:16px;text-align:left;font-size:0.9rem;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid rgba(255,255,255,0.05)}td{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.95rem;color:#e5e7eb}
select.st{padding:6px 10px;border:1px solid rgba(255,255,255,0.1);border-radius:4px;font-family:'Source Sans Pro',sans-serif;background:#222;color:#fff}.del{background:none;border:none;color:#DC2626;cursor:pointer;font-size:1.2rem}
@media(max-width:768px){.stats{grid-template-columns:1fr}}</style></head>
<body>
<div class="login" id="ls"><div class="lb"><h2>Autofine Studio</h2><input type="text" id="u" value="admin"><input type="password" id="p" placeholder="Password"><button onclick="login()">Enter Studio</button></div></div>
<div class="dash" id="dash">
<div class="dh"><h1>Autofine Dashboard</h1><div><button class="be" onclick="exp()">Export CSV</button> <a href="index.html">View Studio</a> <button onclick="logout()">Logout</button></div></div>
<div class="stats"><div class="sc"><div class="sl">Total Requests</div><div class="sv" id="st" style="color:#D1D5DB">0</div></div><div class="sc"><div class="sl">Pending</div><div class="sv" id="sn" style="color:#DC2626">0</div></div><div class="sc"><div class="sl">Scheduled</div><div class="sv" id="sd" style="color:#10b981">0</div></div></div>
<div class="tw"><table><thead><tr><th>Date</th><th>Client</th><th>Phone</th><th>Vehicle</th><th>Service</th><th>Requested Date</th><th>Status</th><th></th></tr></thead><tbody id="tb"></tbody></table></div></div>
<script>
const K='autofine_bookings';if(sessionStorage.getItem('auto_admin')==='true')showD();
function login(){if(document.getElementById('u').value==='admin'&&document.getElementById('p').value==='admin123'){sessionStorage.setItem('auto_admin','true');showD()}else alert('Invalid credentials')}
function logout(){sessionStorage.removeItem('auto_admin');location.reload()}
function showD(){document.getElementById('ls').style.display='none';document.getElementById('dash').style.display='block';render()}
function gd(){return JSON.parse(localStorage.getItem(K)||'[]').sort((a,b)=>new Date(b.submittedAt)-new Date(a.submittedAt))}
function sv(d){localStorage.setItem(K,JSON.stringify(d))}
function render(){const d=gd();document.getElementById('st').textContent=d.length;document.getElementById('sn').textContent=d.filter(x=>x.status==='Pending').length;document.getElementById('sd').textContent=d.filter(x=>x.status==='Scheduled').length;
document.getElementById('tb').innerHTML=d.map(i=>`<tr><td>${new Date(i.submittedAt).toLocaleDateString('en-GB')}</td><td><strong>${i.name||'—'}</strong></td><td>${i.phone||'—'}</td><td>${i.car||'—'}</td><td>${i.service||'—'}</td><td>${i.date||'—'} ${i.time||''}</td><td><select class="st" onchange="upd(${i.id},this.value)">${['Pending','Contacted','Scheduled','Completed'].map(s=>`<option ${i.status===s?'selected':''}>${s}</option>`).join('')}</select></td><td><button class="del" onclick="del(${i.id})">✕</button></td></tr>`).join('')}
function upd(id,s){const d=gd();const i=d.find(x=>x.id===id);if(i){i.status=s;sv(d);render()}}
function del(id){if(!confirm('Remove this request?'))return;sv(gd().filter(x=>x.id!==id));render()}
function exp(){const d=gd();if(!d.length)return alert('No data');const h=['Date','Name','Phone','Car','Service','Pref Date','Time','Status'];const r=d.map(i=>[new Date(i.submittedAt).toLocaleDateString(),i.name,i.phone,i.car,i.service,i.date,i.time,i.status]);const c=[h,...r].map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');const b=new Blob([c],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='autofine_requests.csv';a.click()}
document.getElementById('p').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
</script></body></html>
